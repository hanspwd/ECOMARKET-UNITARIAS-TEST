# ─── Perfil "test" — registro-usuarios-service ────────────────────────────────
# Sustituye MySQL por H2 en memoria. Sin BD real, sin RestTemplate real.
# Colocar en: registro-usuarios-service/src/test/resources/application-test.properties

spring.datasource.url=jdbc:h2:mem:registro_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.application.name=registro-usuarios-service-test