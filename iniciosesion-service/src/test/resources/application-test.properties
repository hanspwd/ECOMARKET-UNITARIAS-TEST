# ─── Perfil "test" ────────────────────────────────────────────────────────────
# Sustituye MySQL por H2 en memoria para que los tests corran sin BD real.
# Colocar en: iniciosesion-service/src/test/resources/application-test.properties

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT — mismos valores que production para que JwtUtil arranque
jwt.secret=7b9b1d2e4f6a8c0e2d4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b
jwt.expiration-ms=86400000

spring.application.name=iniciosesion-service-test