# ─── Perfil "test" — soporte-service ─────────────────────────────────────────
# Colocar en: soporte-service/src/test/resources/application-test.properties

spring.datasource.url=jdbc:h2:mem:soporte_testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# URLs de microservicios — apuntan a localhost para tests unitarios
# (los RestTemplates están mockeados, así que estos valores nunca se usan)
microservicio.usuarios.url=http://localhost:8081
microservicio.pedidos.url=http://localhost:8082

spring.application.name=soporte-service-test